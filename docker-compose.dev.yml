version: '3.8'

services:
  host-umi-react:
    build:
      context: .
      dockerfile: host-umi-react/Dockerfile.dev
    container_name: host-umi-react-dev
    ports:
      - "8000:8000"
    networks:
      - micro-frontend-network
    volumes:
      - ./host-umi-react/src:/app/src
      - ./host-umi-react/config:/app/config
    restart: unless-stopped

  sub-umi-react:
    build:
      context: .
      dockerfile: sub-umi-react/Dockerfile.dev
    container_name: sub-umi-react-dev
    ports:
      - "8001:8001"
    networks:
      - micro-frontend-network
    volumes:
      - ./sub-umi-react/src:/app/src
      - ./sub-umi-react/mock:/app/mock
      - ./sub-umi-react/.umirc.ts:/app/.umirc.ts
    restart: unless-stopped

  sub-react-vite:
    build:
      context: .
      dockerfile: sub-react-vite/Dockerfile.dev
    container_name: sub-react-vite-dev
    ports:
      - "7103:7103"
    networks:
      - micro-frontend-network
    volumes:
      - ./sub-react-vite/src:/app/src
      - ./sub-react-vite/index.html:/app/index.html
      - ./sub-react-vite/vite.config.ts:/app/vite.config.ts
    restart: unless-stopped

  sub-vanilla:
    build:
      context: .
      dockerfile: sub-vanilla/Dockerfile.dev
    container_name: sub-vanilla-dev
    ports:
      - "7102:7102"
    networks:
      - micro-frontend-network
    volumes:
      - ./sub-vanilla/index.html:/app/index.html
      - ./sub-vanilla/main.js:/app/main.js
      - ./sub-vanilla/vite.config.js:/app/vite.config.js
    restart: unless-stopped

  sub-vue-vite:
    build:
      context: .
      dockerfile: sub-vue-vite/Dockerfile.dev
    container_name: sub-vue-vite-dev
    ports:
      - "7101:7101"
    networks:
      - micro-frontend-network
    volumes:
      - ./sub-vue-vite/src:/app/src
      - ./sub-vue-vite/index.html:/app/index.html
      - ./sub-vue-vite/vite.config.ts:/app/vite.config.ts
    restart: unless-stopped

networks:
  micro-frontend-network:
    driver: bridge
